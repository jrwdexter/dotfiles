# ##############################################################################
# PERSONAL HYPRLAND OVERRIDES (mandest)
#
# Sourced LAST by the company hyprland.conf (via `source =
# ~/.config/hypr-local/*.conf`), so anything here wins over the MJL baseline.
# This is where personal app launchers / keybinds / window rules live — the
# baseline intentionally only ships company-standard apps.
#
# $mainMod (= SUPER) is already defined by the time this loads.
# ##############################################################################

# ── Personal app definitions ──
$mail = io.wavebox.Wavebox
$todo = todoist
$notes = notion-app
$beTerminal = kitty -1 --class be_terminal -d ~/src/mjl/clients/smart-management/cam-api -e nuke startservices
$musicClient = kitty -1 --class music -e ncmpcpp
$visualizer = ~/.local/bin/visualizer
$mpsyt = kitty -1 --class music -e mpsyt
$todoInput = kitty -d ~/notes -1 --class todo_input -e nvim -c ":ObsidianToday"

# ── Personal launchers (run or raise) ──
bind = $mainMod, I, exec, $todoInput
bind = $mainMod, F4, exec, raise -c io.wavebox.Wavebox -e $mail
bind = $mainMod CTRL, F3, exec, raise -c Todoist -e $todo
bind = $mainMod CTRL, F4, exec, raise -c notion -e $notes
bind = $mainMod CTRL, F8, exec, raise -c be_terminal -e "$beTerminal"
bind = $mainMod, F9, exec, raise -c music -e "$musicClient"
bind = $mainMod, F10, exec, raise -c music -e "$mpsyt"
bind = $mainMod, F11, exec, raise -c visualizer -e $visualizer

# ── Pomodoro ──
bind = $mainMod, Backslash, exec, pomatez

# ##############################################################################
# PERSONAL WINDOW RULES
# ##############################################################################

# Workspace 2: Communication
windowrule {
    name = ws2-wavebox
    match:class = ^(Wavebox|wavebox|io.wavebox.Wavebox)$
    workspace = 2
}
windowrule {
    name = ws2-wavebox-notifications
    match:class = ^$
    match:title = ^$
    match:xwayland = 0
    float = on
    size = 500 300
    move = monitor_w-window_w-30 monitor_h-window_h-30
    min_size = 500 300
    max_size = 500 300
    border_size = 0
    no_initial_focus = on
}

# Workspace 4: Backend Dev
windowrule {
    name = ws4-be-terminal
    match:class = ^(be_terminal)$
    workspace = 4
}

# Workspace 9: Productivity
windowrule {
    name = ws9-todoist
    match:class = ^(Todoist|todoist)$
    workspace = 9
}
windowrule {
    name = ws9-notion
    match:class = ^(notion)$
    workspace = 9
}
windowrule {
    name = ws9-obsidian
    match:class = ^(obsidian)$
    workspace = 9
}

# Floating Wavebox modal windows
windowrule {
    name = wavebox-modals
    match:class = ^(wavebox-.+-Default)$
    float = true
}

# ##############################################################################
# MONITOR / WORKSPACE PINNING (machine topology — this box: laptop + dock)
#
# mjl-nix-base no longer ships workspace→monitor pinning (it is per-machine
# hardware). This is the layout for THIS machine: laptop panel eDP-1 holds
# ws 8–10, the dock/external outputs (any DP-*) hold ws 1–7.
# ##############################################################################

# Laptop monitor (eDP-1)
workspace = 8, monitor:eDP-1, default:true
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

# External monitor workspaces (1–7), for whichever DP name the dock/direct
# connection presents.
workspace = 1, monitor:DP-1, default:true
workspace = 1, monitor:DP-2, default:true
workspace = 1, monitor:DP-3, default:true
workspace = 1, monitor:DP-4, default:true
workspace = 1, monitor:DP-5, default:true
workspace = 1, monitor:DP-6, default:true
workspace = 2, monitor:DP-1
workspace = 2, monitor:DP-2
workspace = 2, monitor:DP-3
workspace = 2, monitor:DP-4
workspace = 2, monitor:DP-5
workspace = 2, monitor:DP-6
workspace = 3, monitor:DP-1
workspace = 3, monitor:DP-2
workspace = 3, monitor:DP-3
workspace = 3, monitor:DP-4
workspace = 3, monitor:DP-5
workspace = 3, monitor:DP-6
workspace = 4, monitor:DP-1
workspace = 4, monitor:DP-2
workspace = 4, monitor:DP-3
workspace = 4, monitor:DP-4
workspace = 4, monitor:DP-5
workspace = 4, monitor:DP-6
workspace = 5, monitor:DP-1
workspace = 5, monitor:DP-2
workspace = 5, monitor:DP-3
workspace = 5, monitor:DP-4
workspace = 5, monitor:DP-5
workspace = 5, monitor:DP-6
workspace = 6, monitor:DP-1
workspace = 6, monitor:DP-2
workspace = 6, monitor:DP-3
workspace = 6, monitor:DP-4
workspace = 6, monitor:DP-5
workspace = 6, monitor:DP-6
workspace = 7, monitor:DP-1
workspace = 7, monitor:DP-2
workspace = 7, monitor:DP-3
workspace = 7, monitor:DP-4
workspace = 7, monitor:DP-5
workspace = 7, monitor:DP-6

# ##############################################################################
# PERSONAL WORKSPACE ASSIGNMENTS (hobby / non-company-standard apps)
#
# The MJL-standard dev-tool scheme ships from mjl-nix-base
# (/etc/xdg/hypr/mjl-window-rules.conf, workstation.desktop.standardWindowRules).
# Everything below is personal and lives only here.
# ##############################################################################

# Workspace 2: Communication (personal chat — company Slack/Discord ship from
# mjl-nix-base's standard rules)
windowrule {
    name = ws2-telegram
    match:class = ^(TelegramDesktop)$
    workspace = 2
}
windowrule {
    name = ws2-signal
    match:class = ^(Signal)$
    workspace = 2
}
windowrule {
    name = ws2-weechat
    match:class = ^(weechat)$
    workspace = 2
}

# Workspace 9/10 media (music, Spotify, visualizer) are a company-blessed
# opt-in layout — enable `workstation.desktop.mediaWindowRules` in this
# machine's config instead of pinning them here.

# Workspace 10: Misc / System
windowrule {
    name = ws10-keepass
    match:class = ^(KeePassXC)$
    workspace = 10
}
windowrule {
    name = ws10-torrent
    match:class = ^(torrent|Transmission|Deluge)$
    workspace = 10
}
windowrule {
    name = ws10-vm
    match:class = ^(VirtualBox Manager|qemu)$
    workspace = 10
}

# ##############################################################################
# PERSONAL FLOATING WINDOWS
# ##############################################################################

windowrule {
    name = float-copyq
    match:class = ^(copyq|DTA)$
    float = true
}
windowrule {
    name = float-metamask
    match:title = ^(MetaMask Notification|Event Tester)$
    float = true
}
windowrule {
    name = float-emulator
    match:class = ^(Emulator)$
    float = true
}
windowrule {
    name = float-android-emulator
    match:title = ^(Android Emulator)$
    float = true
}

# ##############################################################################
# GAMING (personal)
#
# Steam itself (client + steam_app_* fullscreen) comes from mjl-nix-extras
# (workstation.steam). The workspace Steam lives on, other launchers, and
# specific game titles are personal and live here.
# ##############################################################################

# Workspace 8: Gaming launchers
windowrule {
    name = ws8-steam
    match:class = ^(Steam|steam)$
    workspace = 8
}
windowrule {
    name = ws8-lutris
    match:class = ^(Lutris|lutris)$
    workspace = 8
}
windowrule {
    name = ws8-battlenet
    match:class = ^(battle.net.exe)$
    workspace = 8
}

# Fullscreen games (specific titles)
windowrule {
    name = fullscreen-games-1
    match:class = ^(factorio|dota2|csgo_linux64|portal2_linux)$
    fullscreen = true
}
windowrule {
    name = fullscreen-games-2
    match:class = ^(Terraria.bin.x86|dontstarve_steam|lt-love|EtG.x86_64)$
    fullscreen = true
}

# Final Fantasy XIV (XIVLauncher.Core launcher tiled; game fullscreen)
windowrule {
    name = tile-xivlauncher
    match:class = ^(XIVLauncher.Core)$
    tile = true
    center = true
}
windowrule {
    name = ffxiv
    match:class = ^(ffxiv_dx11.exe)$
    fullscreen = true
}
